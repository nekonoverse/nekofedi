name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t misskey-cli .

      - name: Test import
        run: |
          docker run --rm --entrypoint python misskey-cli -c "
          from misskey_cli.migrate import run_upgrade
          from misskey_cli.api import MisskeyClient
          from misskey_cli.cli import MisskeyCLI
          print('import ok')
          "

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t misskey-cli .

      - name: Run unit tests
        run: |
          docker run --rm \
            -e PYTHONPATH=/app \
            --entrypoint pytest misskey-cli \
            tests/test_i18n.py -v

      - name: Verify locales installed
        run: |
          docker run --rm --entrypoint locale misskey-cli -a | grep -E '^(en_US|ja_JP|fr_FR)\.utf8$'

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Misskey
        run: docker compose -f tests/docker-compose.yml up -d

      - name: Wait for Misskey
        run: |
          for i in $(seq 1 60); do
            if curl -sf -X POST -H 'Content-Type: application/json' -d '{}' http://localhost:61812/api/ping > /dev/null 2>&1; then
              echo "Misskey is ready"
              exit 0
            fi
            echo "Waiting... ($i/60)"
            sleep 5
          done
          echo "Misskey failed to start"
          docker compose -f tests/docker-compose.yml logs misskey
          exit 1

      - name: Build Docker image
        run: docker build -t misskey-cli .

      - name: Run E2E tests
        run: |
          docker run --rm \
            --network tests_net \
            -e MISSKEY_HOST=misskey:3000 \
            --entrypoint python misskey-cli \
            -m pytest tests/test_e2e.py -v

      - name: Cleanup
        if: always()
        run: docker compose -f tests/docker-compose.yml down -v

  e2e-nekonoverse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Nekonoverse
        run: docker compose -f tests/nekonoverse-compose.yml -p nekotest up -d

      - name: Wait for Nekonoverse
        run: |
          for i in $(seq 1 60); do
            status=$(docker inspect -f '{{.State.Health.Status}}' nekotest-app-1 2>/dev/null || echo "missing")
            if [ "$status" = "healthy" ]; then
              echo "Nekonoverse is ready"
              exit 0
            fi
            echo "Waiting... ($i/60) status=$status"
            sleep 5
          done
          echo "Nekonoverse failed to start"
          docker compose -f tests/nekonoverse-compose.yml -p nekotest logs app
          exit 1

      - name: Build Docker image
        run: docker build -t misskey-cli .

      - name: Run Nekonoverse E2E tests
        run: |
          docker run --rm \
            --network nekotest_net \
            -e NEKONOVERSE_HOST=app:8000 \
            --entrypoint python misskey-cli \
            -m pytest tests/test_nekonoverse_e2e.py -v

      - name: Cleanup
        if: always()
        run: docker compose -f tests/nekonoverse-compose.yml -p nekotest down -v
